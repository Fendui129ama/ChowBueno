<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ChowBueno</title>
    <style>
      :root{--bg:#0b0c10;--card:#12131a;--muted:#a2a7b5;--text:#f2f4ff;--line:#23253a;--pri:#7c5cff;--pri2:#23d5ab;--shadow:0 12px 40px rgba(0,0,0,.35)}
      *{box-sizing:border-box}html,body{height:100%}
      body{margin:0;font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;background:radial-gradient(1200px 500px at 20% -10%,rgba(124,92,255,.22),transparent 60%),radial-gradient(900px 400px at 85% 0%,rgba(35,213,171,.18),transparent 55%),var(--bg);color:var(--text)}
      .top{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--line);position:sticky;top:0;backdrop-filter:blur(10px);background:rgba(11,12,16,.65)}
      .brand{display:flex;gap:12px;align-items:center}.logo{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;background:linear-gradient(135deg,rgba(124,92,255,1),rgba(35,213,171,1));color:#0b0c10;font-weight:800;box-shadow:var(--shadow)}
      .title .name{font-weight:800;letter-spacing:.3px}.title .tag{color:var(--muted);font-size:12px;margin-top:2px}.right{display:flex;gap:10px}
      .tabs{display:flex;gap:10px;padding:10px 22px 14px 22px;border-bottom:1px solid var(--line);flex-wrap:wrap;background:rgba(11,12,16,.55);backdrop-filter:blur(10px)}
      .tab{text-decoration:none;color:var(--muted);padding:10px 12px;border-radius:999px;border:1px solid rgba(35,37,58,.95);background:#0f1016;font-size:13px}
      .tab:hover{border-color:rgba(124,92,255,.55);color:var(--text)}.tab.active{color:var(--text);border-color:rgba(124,92,255,.75);box-shadow:0 0 0 3px rgba(124,92,255,.12)}
      .shell{padding:20px 22px;display:grid;grid-template-columns:1.4fr .9fr;gap:16px;align-items:start}.left{min-width:0}
      .rightRail{display:flex;flex-direction:column;gap:16px}.stack{display:flex;flex-direction:column;gap:16px}
      @media (max-width:980px){.shell{grid-template-columns:1fr}}
      .card{background:rgba(18,19,26,.9);border:1px solid rgba(35,37,58,.9);border-radius:16px;padding:16px;box-shadow:var(--shadow)}
      h2{margin:0 0 12px 0;font-size:16px}.card h3{margin:0 0 10px 0;font-size:14px;color:#e7e9ff}
      .card p{margin:0 0 10px 0;color:var(--muted);line-height:1.35}
      .form label{display:block;margin-bottom:10px}.form span{display:block;font-size:12px;color:var(--muted);margin:0 0 6px 2px}
      input{width:100%;background:#0f1016;border:1px solid rgba(35,37,58,.95);color:var(--text);padding:10px 12px;border-radius:12px;outline:none}
      input:focus{border-color:rgba(124,92,255,.9);box-shadow:0 0 0 3px rgba(124,92,255,.15)}
      .actions{display:flex;gap:10px;margin-top:6px;flex-wrap:wrap}.row{display:flex;gap:10px;align-items:center}.row.wrap{flex-wrap:wrap}
      .btn{appearance:none;border:1px solid rgba(35,37,58,.95);background:#0f1016;color:var(--text);padding:10px 12px;border-radius:12px;cursor:pointer}
      .btn:hover{border-color:rgba(124,92,255,.55)}.btn-primary{border-color:rgba(124,92,255,.75);background:linear-gradient(180deg,rgba(124,92,255,.35),rgba(124,92,255,.18))}
      .btn-secondary{border-color:rgba(35,213,171,.70);background:linear-gradient(180deg,rgba(35,213,171,.22),rgba(35,213,171,.10))}
      .list{display:flex;flex-direction:column;gap:10px;margin-top:10px}
      .item{border:1px solid rgba(35,37,58,.9);background:#0f1016;border-radius:14px;padding:10px 12px}
      .item .k{font-size:12px;color:var(--muted)}.item .v{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px;margin-top:4px}
      .item .mini{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
      .log{margin-top:10px;max-height:360px;overflow:auto;border:1px solid rgba(35,37,58,.9);background:#0f1016;border-radius:14px;padding:10px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px}
      .out{margin:0;max-height:520px;overflow:auto;border:1px solid rgba(35,37,58,.9);background:#0f1016;border-radius:14px;padding:12px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px}
      .status{border:1px solid rgba(35,37,58,.9);background:#0f1016;border-radius:14px;padding:12px;color:var(--muted);font-size:12px;line-height:1.35}
      .pill{display:inline-flex;gap:8px;align-items:center;padding:8px 10px;border-radius:999px;border:1px solid rgba(35,37,58,.95);background:#0f1016;color:var(--muted);font-size:12px}
      .pill b{color:var(--text)}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
      .hr{height:1px;background:rgba(35,37,58,.95);margin:12px 0}
      .kbd{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;border:1px solid rgba(35,37,58,.95);background:#0f1016;padding:2px 6px;border-radius:8px;font-size:12px;color:var(--text)}
      .callout{border:1px solid rgba(124,92,255,.35);background:linear-gradient(180deg,rgba(124,92,255,.18),rgba(18,19,26,.6));border-radius:14px;padding:12px}
      .callout b{color:var(--text)}
      .foot{border-top:1px solid var(--line);padding:16px 22px;color:var(--muted);display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap}
      .muted{color:var(--muted)}code{color:#cbd0ff}
      .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
      @media (max-width:820px){.grid2,.grid3{grid-template-columns:1fr}}
      .table{width:100%;border-collapse:collapse;font-size:12px}
      .table th,.table td{border-bottom:1px solid rgba(35,37,58,.95);padding:8px 6px;text-align:left;vertical-align:top}
      .table th{color:var(--muted);font-weight:600}
      ul{margin:6px 0 6px 18px;color:var(--muted)}li{margin:4px 0}
    </style>
  </head>
  <body>
    <header class="top">
      <div class="brand">
        <div class="logo">CB</div>
        <div class="title">
          <div class="name">ChowBueno</div>
          <div class="tag">a tiny UI for ChattaMucha</div>
        </div>
      </div>
      <div class="right">
        <button id="btnHealth" class="btn">Ping</button>
        <button id="btnRandom" class="btn btn-secondary">Random Draft</button>
      </div>
    </header>

    <nav class="tabs" aria-label="ChowBueno navigation">
      <a class="tab" href="#/dash" data-tab="dash">Dash</a>
      <a class="tab" href="#/drafts" data-tab="drafts">Drafts</a>
      <a class="tab" href="#/codec" data-tab="codec">Codec</a>
      <a class="tab" href="#/eip712" data-tab="eip712">EIP-712</a>
      <a class="tab" href="#/activity" data-tab="activity">Activity</a>
      <a class="tab" href="#/settings" data-tab="settings">Settings</a>
      <a class="tab" href="#/help" data-tab="help">Help</a>
    </nav>

    <main class="shell">
      <section class="left">
        <div id="view" class="stack"></div>
      </section>
      <aside class="rightRail">
        <div class="card">
          <h2>Output</h2>
          <div class="row">
            <button id="btnCopyOut" class="btn btn-secondary">Copy</button>
            <button id="btnClearOut" class="btn">Clear</button>
          </div>
          <pre id="out" class="out"></pre>
        </div>
        <div class="card">
          <h2>Status</h2>
          <div id="status" class="status"></div>
        </div>
